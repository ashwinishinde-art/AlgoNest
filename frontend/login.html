<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AlgoNest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" crossorigin>
    <link rel="stylesheet" href="assets/css/tailwind.min.css">
    <link rel="stylesheet" href="assets/css/styles.css?v=2">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #060d1f;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* ── Landing-style background (identical to landing.html) ── */
        .mesh-bg {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 70% 45% at 50% 0%,   rgba(37,99,235,0.32)  0%, transparent 60%),
                radial-gradient(ellipse 45% 35% at 0%   40%, rgba(109,40,217,0.22) 0%, transparent 55%),
                radial-gradient(ellipse 40% 30% at 100% 55%, rgba(6,182,212,0.16)  0%, transparent 50%),
                radial-gradient(ellipse 50% 35% at 20%  90%, rgba(139,92,246,0.18) 0%, transparent 55%),
                #060d1f;
        }
        .grid-overlay {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(99,130,200,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,130,200,0.04) 1px, transparent 1px);
            background-size: 48px 48px;
        }
        .blob {
            position: fixed; border-radius: 50%;
            filter: blur(80px); opacity: 0.35; pointer-events: none; z-index: 0;
        }
        .blob1 { width:520px; height:520px; background:radial-gradient(circle,#2563eb,transparent 70%); top:-120px; left:-100px; animation: drift1 14s ease-in-out infinite; }
        .blob2 { width:440px; height:440px; background:radial-gradient(circle,#7c3aed,transparent 70%); top:30%; right:-100px; animation: drift2 18s ease-in-out infinite; }
        .blob3 { width:360px; height:360px; background:radial-gradient(circle,#0891b2,transparent 70%); bottom:10%; left:30%; animation: drift1 22s ease-in-out infinite reverse; }
        @keyframes drift1 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(40px,-30px) scale(1.05)} 66%{transform:translate(-20px,20px) scale(0.97)} }
        @keyframes drift2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-50px,40px) scale(1.08)} }

        /* no blur overlay — background shows through clearly */
        .bg-blur { display: none; }

        /* ── Card ── */
        .glass-card {
            background: rgba(8,15,36,0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(99,130,200,0.18);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 24px 56px rgba(0,0,0,0.6);
        }

        /* ── Divider ── */
        .login-divider {
            display: flex; align-items: center; gap: 10px;
            color: #94a3b8; font-size: 12px; font-weight: 700;
        }
        .login-divider::before, .login-divider::after {
            content: ''; flex: 1; height: 1px;
            background: rgba(99,130,200,0.2);
        }

        /* ── Faculty button ── */
        .btn-faculty {
            border: 1px solid rgba(59,130,246,0.5);
            color: #93c5fd;
            background: rgba(59,130,246,0.07);
            transition: background 0.15s, border-color 0.15s;
            font-size: 13px; font-weight: 600;
        }
        .btn-faculty:hover { background: rgba(59,130,246,0.14); border-color: rgba(59,130,246,0.8); }

        /* ── Submit button ── */
        .btn-primary {
            background: linear-gradient(135deg, #2563eb, #6d28d9);
            border: none;
            box-shadow: 0 4px 18px rgba(99,102,241,0.35);
            transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
            font-size: 14px;
        }
        .btn-primary:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 28px rgba(99,102,241,0.5); }
        .btn-primary:active:not(:disabled) { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── Inputs ── */
        .input-field {
            background: rgba(6,13,31,0.7);
            border: 1px solid rgba(99,130,200,0.2);
            color: #e2e8f0;
            font-size: 14px;
            line-height: 1.5;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .input-field::placeholder { color: #374151; }
        textarea.input-field::placeholder { color: #6b7280; }
        .input-field:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }

        /* ── Labels ── */
        .field-label {
            font-size: 11px; font-weight: 700;
            color: #cbd5e1;
            letter-spacing: 0.06em; text-transform: uppercase;
            display: flex; align-items: center; gap: 5px;
            margin-bottom: 5px;
        }

        /* ── Global text weight boost ── */
        .glass-card p, .glass-card span, .glass-card label,
        .glass-card input, .glass-card textarea, .glass-card select,
        .glass-card button { font-weight: 600; }
        .glass-card h1 { font-weight: 800; }
        .glass-card .text-slate-500 { color: #cbd5e1 !important; }
        .glass-card .text-slate-400 { color: #e2e8f0 !important; }
        .glass-card .text-slate-300 { color: #f1f5f9 !important; }
        .glass-card .text-slate-200 { color: #ffffff !important; }

        /* ── Spinner ── */
        .spinner {
            width: 15px; height: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 0.65s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Global text brightness boost ── */
        .login-divider { color: #e2e8f0 !important; }
        body .text-slate-300 { color: #f1f5f9 !important; }
        body .text-slate-200 { color: #ffffff !important; }

        /* ── Password wrapper ── */
        .pw-wrap { position: relative; }
        .pw-wrap input { padding-right: 2.5rem !important; }
        .pw-toggle {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: none; border: none; padding: 0; cursor: pointer;
            color: #64748b; transition: color 0.15s; line-height: 0;
        }
        .pw-toggle:hover { color: #94a3b8; }

        /* ── Click-outside backdrop ── */
        .login-backdrop {
            position: fixed; inset: 0; z-index: 5; cursor: pointer;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="mesh-bg"></div>
    <div class="grid-overlay"></div>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
    <div class="bg-blur"></div>

    <div class="login-backdrop" @click="window.location.href='landing.html'"></div>

    <div x-data="loginForm()" class="glass-card w-full max-w-md rounded-2xl p-8 relative z-10" @click.stop>

        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-white mb-1" style="letter-spacing:-0.3px;">
                Algo<span style="color:#58a6ff;">Nest</span>
            </h1>
            <p class="text-slate-300 text-[13px] font-semibold"
               x-text="mode === 'login' ? 'Welcome back, coder!' : mode === 'register' ? 'Create an account to start coding' : 'Apply for Faculty Access'">
            </p>
        </div>

        <!-- Alert -->
        <div x-show="alert.show" x-transition class="mb-5 p-3 rounded-xl text-sm font-medium flex items-start gap-2"
             :class="alert.type === 'error'
                ? 'border'
                : 'bg-green-500/10 text-green-400 border border-green-500/30'"
             :style="alert.type === 'error' ? 'background:#ca8a04; border-color:#fde047; color:#ffffff;' : ''">
            <svg x-show="alert.type === 'error'" class="w-4 h-4 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="#ff3b3b" stroke-width="2"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01"/></svg>
            <svg x-show="alert.type !== 'error'" class="w-4 h-4 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
            <span x-text="alert.message"></span>
        </div>

        <!-- ── LOGIN / REGISTER FORM ── -->
        <form x-show="mode !== 'faculty'" @submit.prevent="submitForm" class="space-y-4">
            <!-- Username (register only) -->
            <div x-show="mode === 'register'" x-transition>
                <label class="field-label">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    Username
                </label>
                <input type="text" x-model="formData.username" placeholder="your_handle"
                       class="input-field w-full rounded-md py-2 px-3">
            </div>

            <!-- Email -->
            <div>
                <label class="field-label">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    Email Address
                </label>
                <input type="email" x-model="formData.email" required placeholder="you@example.com"
                       class="input-field w-full rounded-md py-2 px-3" style="font-size:14px; line-height:1.5;">
            </div>

            <!-- Password -->
            <div>
                <label class="field-label">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M7 11V7a5 5 0 0110 0v4"/>
                    </svg>
                    Password
                </label>
                <div class="pw-wrap">
                    <input :type="showPassword ? 'text' : 'password'" x-model="formData.password" required placeholder="••••••••"
                           class="input-field w-full rounded-md py-2 px-3" style="font-size:14px; line-height:1.5;">
                    <button type="button" class="pw-toggle" @click="showPassword = !showPassword" tabindex="-1">
                        <!-- eye open -->
                        <svg x-show="!showPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                        <!-- eye off -->
                        <svg x-show="showPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.525-4.025M6.343 6.343A9.97 9.97 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.97 9.97 0 01-1.357 2.635M6.343 6.343L3 3m3.343 3.343l11.314 11.314M17.657 17.657L21 21"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-primary w-full text-white font-semibold py-2.5 rounded-md mt-1 flex items-center justify-center gap-2"
                    :disabled="loading">
                <span class="spinner" x-show="loading"></span>
                <span x-show="!loading" x-text="mode === 'register' ? 'Create Account' : 'Sign In'"></span>
                <span x-show="loading">Processing...</span>
            </button>
        </form>

        <!-- ── DIVIDER ── -->
        <div x-show="mode !== 'faculty'" class="login-divider my-5">
            <span>OR</span>
        </div>

        <!-- ── FOOTER LINKS ── -->
        <div x-show="mode !== 'faculty'" class="space-y-3">
            <button @click="setMode('faculty')" class="btn-faculty w-full py-2.5 rounded-md font-bold">
                Register as Faculty
            </button>
            <div class="text-center pt-4">
                <button @click="toggleMode()" class="text-[12px] text-slate-500 hover:text-slate-300 font-medium transition-colors">
                    <span x-text="mode === 'register' ? 'Already have an account? Sign In' : 'New user? Sign Up'"></span>
                </button>
            </div>
        </div>

        <!-- ── FACULTY REGISTRATION FORM ── -->
        <form x-show="mode === 'faculty'" @submit.prevent="submitFacultyForm" class="space-y-4">
            <!-- Back to Login -->
            <button type="button" @click="setMode('login')" style="white-space:nowrap;" class="text-[13px] text-slate-400 hover:text-slate-200 font-semibold transition-colors inline-flex items-center gap-1 leading-none -mt-1 mb-1">
                <svg class="w-3.5 h-3.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg><span>Back to Login</span>
            </button>
            <!-- Step indicator -->
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center space-x-2">
                    <div :class="facultyStep >= 1 ? 'bg-blue-600 text-white' : 'bg-slate-700/60 text-slate-500'"
                         class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold transition-colors">1</div>
                    <div class="h-px w-8" :class="facultyStep >= 2 ? 'bg-blue-600' : 'bg-slate-700/60'"></div>
                    <div :class="facultyStep >= 2 ? 'bg-blue-600 text-white' : 'bg-slate-700/60 text-slate-500'"
                         class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold transition-colors">2</div>
                    <div class="h-px w-8" :class="facultyStep >= 3 ? 'bg-blue-600' : 'bg-slate-700/60'"></div>
                    <div :class="facultyStep >= 3 ? 'bg-blue-600 text-white' : 'bg-slate-700/60 text-slate-500'"
                         class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold transition-colors">3</div>
                </div>
                <span class="text-xs text-slate-200 font-bold" x-text="'Step ' + facultyStep + ' of 3'"></span>
            </div>

            <!-- Step 1: Account -->
            <div x-show="facultyStep === 1" class="space-y-4">
                <p class="text-sm font-semibold text-slate-200">Account Details</p>
                <div>
                    <label class="field-label">
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                        Username
                    </label>
                    <input type="text" x-model="facultyData.username" required placeholder="your_handle"
                           class="input-field w-full rounded-md py-2 px-3">
                </div>
                <div>
                    <label class="field-label">
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                        </svg>
                        Email Address
                    </label>
                    <input type="email" x-model="facultyData.email" required placeholder="you@university.edu"
                           class="input-field w-full rounded-md py-2 px-3">
                </div>
                <div>
                    <label class="field-label">
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M7 11V7a5 5 0 0110 0v4"/>
                        </svg>
                        Password
                    </label>
                    <div class="pw-wrap">
                        <input :type="showFacultyPassword ? 'text' : 'password'" x-model="facultyData.password" required placeholder="••••••••"
                               class="input-field w-full rounded-md py-2 px-3">
                        <button type="button" class="pw-toggle" @click="showFacultyPassword = !showFacultyPassword" tabindex="-1">
                            <svg x-show="!showFacultyPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                            <svg x-show="showFacultyPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.525-4.025M6.343 6.343A9.97 9.97 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.97 9.97 0 01-1.357 2.635M6.343 6.343L3 3m3.343 3.343l11.314 11.314M17.657 17.657L21 21"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="button" @click="facultyNextStep()"
                        class="btn-primary w-full text-white font-semibold py-2.5 rounded-md flex items-center justify-center gap-1">
                    Next
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                </button>
            </div>

            <!-- Step 2: Institution -->
            <div x-show="facultyStep === 2" class="space-y-4">
                <p class="text-sm font-semibold text-slate-200">Institution Details</p>
                <div>
                    <label class="field-label">Full Name</label>
                    <input type="text" x-model="facultyData.full_name" required placeholder="Dr. Jane Smith"
                           class="input-field w-full rounded-md py-2 px-3">
                </div>
                <div>
                    <label class="field-label">Institution / University</label>
                    <input type="text" x-model="facultyData.institution" required placeholder="MIT"
                           class="input-field w-full rounded-md py-2 px-3">
                </div>
                <div>
                    <label class="field-label">Department</label>
                    <input type="text" x-model="facultyData.department" required placeholder="Computer Science"
                           class="input-field w-full rounded-md py-2 px-3">
                </div>
                <div>
                    <label class="field-label">Designation</label>
                    <select x-model="facultyData.designation" required
                            class="input-field w-full rounded-md py-2 px-3">
                        <option value="" class="bg-slate-900">Select designation…</option>
                        <option class="bg-slate-900">Professor</option>
                        <option class="bg-slate-900">Associate Professor</option>
                        <option class="bg-slate-900">Assistant Professor</option>
                        <option class="bg-slate-900">Lecturer</option>
                        <option class="bg-slate-900">Teaching Assistant</option>
                        <option class="bg-slate-900">Visiting Faculty</option>
                        <option class="bg-slate-900">Other</option>
                    </select>
                </div>
                <div class="flex gap-3">
                    <button type="button" @click="facultyStep = 1"
                            class="flex-1 border border-slate-600/60 hover:border-slate-500 text-slate-300 font-semibold py-2.5 rounded-md transition-all flex items-center justify-center gap-1 text-sm">
                        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg> Back
                    </button>
                    <button type="button" @click="facultyNextStep()"
                            class="btn-primary flex-1 text-white font-semibold py-2.5 rounded-md flex items-center justify-center gap-1 text-sm">
                        Next <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                    </button>
                </div>
            </div>

            <!-- Step 3: Reason -->
            <div x-show="facultyStep === 3" class="space-y-4">
                <p class="text-sm font-semibold text-slate-200">Why do you need faculty access?</p>
                <div>
                    <label class="field-label">Reason / Motivation</label>
                    <textarea x-model="facultyData.reason" required rows="4"
                              placeholder="Briefly describe how you plan to use faculty access…"
                              class="input-field w-full rounded-md py-2 px-3 resize-none"></textarea>
                </div>
                <div class="p-3 rounded-lg flex items-start gap-2 text-xs font-bold border" style="background:rgba(253,224,71,0.12); border-color:rgba(253,224,71,0.35); color:#fef08a;">
                    <svg class="w-4 h-4 mt-0.5 shrink-0 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="#ff3b3b" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01"/></svg>
                    <span>Your request will be reviewed by an admin. You won't be able to log in until approved.</span>
                </div>
                <div class="flex gap-3">
                    <button type="button" @click="facultyStep = 2"
                            class="flex-1 border border-slate-600/60 hover:border-slate-500 text-slate-300 font-semibold py-2.5 rounded-md transition-all flex items-center justify-center gap-1 text-sm">
                        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg> Back
                    </button>
                    <button type="submit"
                            class="btn-primary flex-1 text-white font-semibold py-2.5 rounded-md flex items-center justify-center gap-2 text-sm"
                            :disabled="loading">
                        <span class="spinner" x-show="loading"></span>
                        <span x-show="!loading">Submit Request</span>
                        <span x-show="loading">Submitting…</span>
                    </button>
                </div>
            </div>
        </form>

    </div>

    <script src="assets/js/app.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        function loginForm() {
            return {
                mode: 'login', // 'login' | 'register' | 'faculty'
                facultyStep: 1,
                loading: false,
                showPassword: false,
                showFacultyPassword: false,
                formData: { username: '', email: '', password: '' },
                facultyData: {
                    username: '', email: '', password: '',
                    full_name: '', institution: '', department: '',
                    designation: '', reason: ''
                },
                alert: { show: false, type: 'error', message: '' },

                init() {
                    const user = Auth.getUser();
                    if (!user) return;

                    // Any blocked role — clear the stale token so the form works cleanly
                    if (user.role === 'pending_faculty' || user.role === 'declined_faculty') {
                        Auth.clearToken();
                        return; // Let them log in normally; backend will return the real status message
                    }

                    // Valid active session — skip the login page entirely
                    if (Auth.isAuthenticated()) {
                        window.location.href = 'index.html';
                    }
                },

                setMode(m) {
                    this.mode = m;
                    this.alert.show = false;
                    this.facultyStep = 1;
                    this.showPassword = false;
                    this.showFacultyPassword = false;
                },
                toggleMode() {
                    this.mode = this.mode === 'login' ? 'register' : 'login';
                    this.alert.show = false;
                    this.showPassword = false;
                },

                facultyNextStep() {
                    // Basic validation per step
                    if (this.facultyStep === 1) {
                        if (!this.facultyData.username || !this.facultyData.email || !this.facultyData.password) {
                            this.showAlert('error', 'Please fill in all account fields.');
                            return;
                        }
                    } else if (this.facultyStep === 2) {
                        if (!this.facultyData.full_name || !this.facultyData.institution || !this.facultyData.department || !this.facultyData.designation) {
                            this.showAlert('error', 'Please fill in all institution fields.');
                            return;
                        }
                    }
                    this.alert.show = false;
                    this.facultyStep++;
                },

                showAlert(type, message) {
                    this.alert = { show: true, type, message };
                },

                async submitForm() {
                    if (this.loading) return;
                    this.loading = true;
                    this.alert.show = false;

                    const isReg = this.mode === 'register';
                    const endpoint = isReg ? '/auth/register' : '/auth/login';
                    const payload = isReg ? this.formData : { email: this.formData.email, password: this.formData.password };

                    try {
                        const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        const resData = await response.json();
                        if (!response.ok) throw new Error(resData.message || 'Authentication failed');

                        if (isReg) {
                            this.showAlert('success', 'Registration successful! You can now login.');
                            this.mode = 'login';
                            this.formData.username = '';
                            this.formData.password = '';
                        } else {
                            Auth.setToken(resData.token);
                            window.location.href = 'index.html';
                        }
                    } catch (err) {
                        this.showAlert('error', err.message);
                    } finally {
                        this.loading = false;
                    }
                },

                async submitFacultyForm() {
                    if (this.loading) return;
                    if (!this.facultyData.reason.trim()) {
                        this.showAlert('error', 'Please provide a reason for your faculty request.');
                        return;
                    }
                    this.loading = true;
                    this.alert.show = false;

                    try {
                        // Step 1: Register the user account
                        const regRes = await fetch(`${API_BASE_URL}/auth/register`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                username: this.facultyData.username,
                                email: this.facultyData.email,
                                password: this.facultyData.password
                            })
                        });
                        const regData = await regRes.json();
                        if (!regRes.ok) throw new Error(regData.message || 'Registration failed');

                        // Step 2: Log in to get token
                        const loginRes = await fetch(`${API_BASE_URL}/auth/login`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: this.facultyData.email, password: this.facultyData.password })
                        });
                        const loginData = await loginRes.json();
                        if (!loginRes.ok) throw new Error('Auto-login failed after registration.');

                        // Step 3: Submit faculty request
                        const facRes = await fetch(`${API_BASE_URL}/auth/faculty-register`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + loginData.token
                            },
                            body: JSON.stringify({
                                full_name: this.facultyData.full_name,
                                institution: this.facultyData.institution,
                                department: this.facultyData.department,
                                designation: this.facultyData.designation,
                                reason: this.facultyData.reason
                            })
                        });
                        const facData = await facRes.json();
                        if (!facRes.ok) throw new Error(facData.message || 'Failed to submit faculty request.');

                        this.showAlert('success', 'Your request is under review. We will contact you shortly.');
                        this.setMode('login');
                    } catch (err) {
                        this.showAlert('error', err.message);
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
