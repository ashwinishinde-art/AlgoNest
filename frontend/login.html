<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AlgoNest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" crossorigin>
    <link rel="stylesheet" href="assets/css/tailwind.min.css">
    <link rel="stylesheet" href="assets/css/styles.css?v=2">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        /* Dark background — canvas renders code rain on top */
        body { background: #0d1117; }

        /* Card glass effect */
        .glass-card {
            background: rgba(13, 17, 23, 0.82);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(48, 54, 61, 0.9);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 20px 60px rgba(0,0,0,0.6);
        }
        /* Tab switcher */
        .tab-active {
            background: #238636;
            color: #fff;
            box-shadow: 0 2px 8px rgba(35,134,54,0.4);
        }
        /* Input */
        .input-field {
            background: #161b22;
            border: 1px solid #30363d;
            color: #e6edf3;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .input-field::placeholder { color: #484f58; }
        .input-field:focus {
            outline: none;
            border-color: #388bfd;
            box-shadow: 0 0 0 3px rgba(56,139,253,0.15);
        }
        /* Submit button */
        .btn-primary {
            background: #238636;
            border: 1px solid rgba(240,246,252,0.1);
            transition: background 0.15s, transform 0.1s;
        }
        .btn-primary:hover:not(:disabled) { background: #2ea043; transform: translateY(-1px); }
        .btn-primary:active:not(:disabled) { transform: translateY(0); background: #238636; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        /* Spinner */
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.25);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Code rain canvas */
        #codeCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.45;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex items-center justify-center p-4">
    <!-- Code rain canvas -->
    <canvas id="codeCanvas"></canvas>

    <div x-data="loginForm()" class="glass-card w-full max-w-md rounded-2xl p-8 relative z-10">

        <!-- Logo/Header -->
        <div class="text-center mb-7">
            <h1 class="text-3xl font-extrabold tracking-tight text-white mb-1" style="letter-spacing:-0.5px;">
                Algo<span style="color:#3fb950;">Nest</span>
            </h1>
            <p class="text-slate-500 text-sm"
               x-text="mode === 'login' ? 'Welcome back, coder!' : mode === 'register' ? 'Create an account to start coding' : 'Apply for Faculty Access'">
            </p>
        </div>

        <!-- Tab Switcher (login / register only) -->
        <div x-show="mode !== 'faculty'" class="flex bg-slate-800/60 rounded-xl p-1 mb-6 border border-slate-700/50">
            <button type="button" @click="setMode('login')"
                    class="flex-1 py-2 rounded-lg text-sm font-semibold transition-all duration-200"
                    :class="mode === 'login' ? 'tab-active' : 'text-slate-400 hover:text-slate-200'">
                Sign In
            </button>
            <button type="button" @click="setMode('register')"
                    class="flex-1 py-2 rounded-lg text-sm font-semibold transition-all duration-200"
                    :class="mode === 'register' ? 'tab-active' : 'text-slate-400 hover:text-slate-200'">
                Sign Up
            </button>
        </div>

        <!-- Alert -->
        <div x-show="alert.show" x-transition class="mb-5 p-3 rounded-xl text-sm font-medium flex items-start gap-2"
             :class="alert.type === 'error'
                ? 'bg-red-500/10 text-red-400 border border-red-500/30'
                : 'bg-green-500/10 text-green-400 border border-green-500/30'">
            <svg x-show="alert.type === 'error'" class="w-4 h-4 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01"/></svg>
            <svg x-show="alert.type !== 'error'" class="w-4 h-4 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
            <span x-text="alert.message"></span>
        </div>

        <!-- ── LOGIN / REGISTER FORM ── -->
        <form x-show="mode !== 'faculty'" @submit.prevent="submitForm" class="space-y-4">
            <!-- Username (register only) -->
            <div x-show="mode === 'register'">
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    </span>
                    <input type="text" x-model="formData.username" placeholder="your_handle"
                           class="input-field w-full rounded-xl py-3 pl-9 pr-4 text-sm">
                </div>
            </div>

            <!-- Email -->
            <div>
                <div class="flex items-center justify-between mb-1.5">
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Email Address</label>
                    <span class="text-xs text-slate-600 font-mono">you@example.com</span>
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    </span>
                    <input type="email" x-model="formData.email" required placeholder="you@example.com"
                           class="input-field w-full rounded-lg py-2.5 pl-9 pr-4 text-sm">
                </div>
            </div>

            <!-- Password -->
            <div>
                <div class="flex items-center justify-between mb-1.5">
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Password</label>
                    <button type="button" @click="showPassword = !showPassword"
                            class="text-slate-500 hover:text-slate-300 transition-colors"
                            :aria-label="showPassword ? 'Hide password' : 'Show password'">
                        <svg x-show="!showPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                        <svg x-show="showPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.956 9.956 0 012.293-3.95M6.228 6.228A9.956 9.956 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.956 9.956 0 01-1.768 3.228M6.228 6.228L3 3m3.228 3.228l3.65 3.65M17.772 17.772L21 21m-3.228-3.228l-3.65-3.65"/>
                        </svg>
                    </button>
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path stroke-linecap="round" stroke-linejoin="round" d="M7 11V7a5 5 0 0110 0v4"/></svg>
                    </span>
                    <input :type="showPassword ? 'text' : 'password'" x-model="formData.password" required placeholder="••••••••"
                           class="input-field w-full rounded-lg py-2.5 pl-9 pr-4 text-sm">
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-primary w-full text-white font-semibold py-3 rounded-xl mt-2 flex items-center justify-center gap-2"
                    :disabled="loading">
                <span class="spinner" x-show="loading"></span>
                <span x-show="!loading" x-text="mode === 'register' ? 'Create Account' : 'Sign In'"></span>
                <span x-show="loading">Please wait…</span>
            </button>
        </form>

        <!-- ── FACULTY REGISTRATION FORM ── -->
        <form x-show="mode === 'faculty'" @submit.prevent="submitFacultyForm" class="space-y-4">
            <!-- Step indicator -->
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center space-x-2">
                    <div :class="facultyStep >= 1 ? 'bg-indigo-600 text-white' : 'bg-slate-700 text-slate-400'"
                         class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold transition-colors">1</div>
                    <div class="h-0.5 w-8" :class="facultyStep >= 2 ? 'bg-indigo-600' : 'bg-slate-700'"></div>
                    <div :class="facultyStep >= 2 ? 'bg-indigo-600 text-white' : 'bg-slate-700 text-slate-400'"
                         class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold transition-colors">2</div>
                    <div class="h-0.5 w-8" :class="facultyStep >= 3 ? 'bg-indigo-600' : 'bg-slate-700'"></div>
                    <div :class="facultyStep >= 3 ? 'bg-indigo-600 text-white' : 'bg-slate-700 text-slate-400'"
                         class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold transition-colors">3</div>
                </div>
                <span class="text-xs text-slate-500" x-text="'Step ' + facultyStep + ' of 3'"></span>
            </div>

            <!-- Step 1: Account -->
            <div x-show="facultyStep === 1" class="space-y-4">
                <p class="text-sm font-semibold text-slate-300">Account Details</p>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Username</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                        </span>
                        <input type="text" x-model="facultyData.username" required placeholder="your_handle"
                               class="input-field w-full rounded-xl py-3 pl-9 pr-4 text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                        </span>
                        <input type="email" x-model="facultyData.email" required placeholder="you@university.edu"
                               class="input-field w-full rounded-xl py-3 pl-9 pr-4 text-sm">
                    </div>
                </div>
                <div>
                    <div class="flex items-center justify-between mb-1.5">
                        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Password</label>
                        <button type="button" @click="showFacultyPassword = !showFacultyPassword"
                                class="flex items-center gap-1 text-xs text-slate-500 hover:text-indigo-400 transition-colors">
                            <svg x-show="!showFacultyPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                            <svg x-show="showFacultyPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.956 9.956 0 012.293-3.95M6.228 6.228A9.956 9.956 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.956 9.956 0 01-1.768 3.228M6.228 6.228L3 3m3.228 3.228l3.65 3.65M17.772 17.772L21 21m-3.228-3.228l-3.65-3.65"/>
                            </svg>
                            <span x-text="showFacultyPassword ? 'Hide' : 'Show'"></span>
                        </button>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path stroke-linecap="round" stroke-linejoin="round" d="M7 11V7a5 5 0 0110 0v4"/></svg>
                        </span>
                        <input :type="showFacultyPassword ? 'text' : 'password'" x-model="facultyData.password" required placeholder="••••••••"
                               class="input-field w-full rounded-xl py-3 pl-9 pr-4 text-sm">
                    </div>
                </div>
                <button type="button" @click="facultyNextStep()"
                        class="btn-primary w-full text-white font-semibold py-3 rounded-xl flex items-center justify-center gap-1">
                    Next <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                </button>
            </div>

            <!-- Step 2: Institution -->
            <div x-show="facultyStep === 2" class="space-y-4">
                <p class="text-sm font-semibold text-slate-300">Institution Details</p>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Full Name</label>
                    <input type="text" x-model="facultyData.full_name" required placeholder="Dr. Jane Smith"
                           class="input-field w-full rounded-xl py-3 px-4 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Institution / University</label>
                    <input type="text" x-model="facultyData.institution" required placeholder="MIT"
                           class="input-field w-full rounded-xl py-3 px-4 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Department</label>
                    <input type="text" x-model="facultyData.department" required placeholder="Computer Science"
                           class="input-field w-full rounded-xl py-3 px-4 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Designation</label>
                    <select x-model="facultyData.designation" required
                            class="input-field w-full rounded-xl py-3 px-4 text-sm">
                        <option value="" class="bg-slate-800">Select designation…</option>
                        <option class="bg-slate-800">Professor</option>
                        <option class="bg-slate-800">Associate Professor</option>
                        <option class="bg-slate-800">Assistant Professor</option>
                        <option class="bg-slate-800">Lecturer</option>
                        <option class="bg-slate-800">Teaching Assistant</option>
                        <option class="bg-slate-800">Visiting Faculty</option>
                        <option class="bg-slate-800">Other</option>
                    </select>
                </div>
                <div class="flex gap-3">
                    <button type="button" @click="facultyStep = 1"
                            class="flex-1 bg-slate-700/60 hover:bg-slate-700 text-slate-300 font-semibold py-3 rounded-xl transition-all flex items-center justify-center gap-1">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg> Back
                    </button>
                    <button type="button" @click="facultyNextStep()"
                            class="btn-primary flex-1 text-white font-semibold py-3 rounded-xl flex items-center justify-center gap-1">
                        Next <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                    </button>
                </div>
            </div>

            <!-- Step 3: Reason -->
            <div x-show="facultyStep === 3" class="space-y-4">
                <p class="text-sm font-semibold text-slate-300">Why do you need faculty access?</p>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Reason / Motivation</label>
                    <textarea x-model="facultyData.reason" required rows="5"
                              placeholder="Briefly describe how you plan to use faculty access (e.g., setting assignments, reviewing student submissions)…"
                              class="input-field w-full rounded-xl py-3 px-4 text-sm resize-none"></textarea>
                </div>
                <div class="p-3 rounded-xl flex items-start gap-2 text-xs text-indigo-300 border border-indigo-500/30 bg-indigo-500/10">
                    <svg class="w-4 h-4 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m0 0v2m0-2h2m-2 0H10m2-6V7"/><circle cx="12" cy="12" r="10"/></svg>
                    Your request will be reviewed by an admin. You won't be able to log in until approved.
                </div>
                <div class="flex gap-3">
                    <button type="button" @click="facultyStep = 2"
                            class="flex-1 bg-slate-700/60 hover:bg-slate-700 text-slate-300 font-semibold py-3 rounded-xl transition-all flex items-center justify-center gap-1">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg> Back
                    </button>
                    <button type="submit"
                            class="btn-primary flex-1 text-white font-semibold py-3 rounded-xl flex items-center justify-center gap-2"
                            :disabled="loading">
                        <span class="spinner" x-show="loading"></span>
                        <span x-show="!loading">Submit Request 🎓</span>
                        <span x-show="loading">Submitting…</span>
                    </button>
                </div>
            </div>
        </form>

        <!-- ── Footer Links ── -->
        <div class="text-center mt-6 space-y-2">
            <template x-if="mode !== 'faculty'">
                <div>
                    <button @click="setMode('faculty')" class="mt-2 text-sm text-indigo-400 hover:text-indigo-300 transition-colors font-medium">
                        🎓 Register as Faculty
                    </button>
                </div>
            </template>
            <template x-if="mode === 'faculty'">
                <button @click="setMode('login')" class="text-sm text-slate-500 hover:text-slate-300 transition-colors flex items-center gap-1 mx-auto">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                    Back to Login
                </button>
            </template>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        // ── Code Rain Background ──
        (function() {
            const canvas = document.getElementById('codeCanvas');
            const ctx = canvas.getContext('2d');

            // Mix of C++, Python, JS snippets and symbols
            const chars = 'int void bool return if else for while auto const std::vector push_back nullptr true false 01{}[]();=>+-%&&||!#include<bits/stdc++.h>defclassimportfrompasslambda';
            const charArr = chars.split('');

            let cols, drops;
            const fontSize = 13;

            function init() {
                canvas.width  = window.innerWidth;
                canvas.height = window.innerHeight;
                cols  = Math.floor(canvas.width / fontSize);
                drops = Array.from({ length: cols }, () => Math.random() * -50);
            }

            function draw() {
                // Semi-transparent fade
                ctx.fillStyle = 'rgba(13, 17, 23, 0.055)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.font = `${fontSize}px "Fira Code", monospace`;

                for (let i = 0; i < drops.length; i++) {
                    const ch = charArr[Math.floor(Math.random() * charArr.length)];
                    const y  = drops[i] * fontSize;

                    // Head of stream — bright green
                    if (drops[i] > 0 && drops[i] < canvas.height / fontSize) {
                        ctx.fillStyle = '#7ee787';
                        ctx.fillText(ch, i * fontSize, y);
                    }

                    // Body — dimmer green
                    ctx.fillStyle = '#238636';
                    ctx.fillText(ch, i * fontSize, y - fontSize);

                    // Random reset
                    if (y > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i] += 0.4;
                }
            }

            init();
            window.addEventListener('resize', init);
            setInterval(draw, 45);
        })();
    </script>
    <script>
        function loginForm() {
            return {
                mode: 'login', // 'login' | 'register' | 'faculty'
                facultyStep: 1,
                loading: false,
                showPassword: false,
                showFacultyPassword: false,
                formData: { username: '', email: '', password: '' },
                facultyData: {
                    username: '', email: '', password: '',
                    full_name: '', institution: '', department: '',
                    designation: '', reason: ''
                },
                alert: { show: false, type: 'error', message: '' },

                setMode(m) {
                    this.mode = m;
                    this.alert.show = false;
                    this.facultyStep = 1;
                    this.showPassword = false;
                    this.showFacultyPassword = false;
                },
                toggleMode() {
                    this.mode = this.mode === 'login' ? 'register' : 'login';
                    this.alert.show = false;
                    this.showPassword = false;
                },

                facultyNextStep() {
                    // Basic validation per step
                    if (this.facultyStep === 1) {
                        if (!this.facultyData.username || !this.facultyData.email || !this.facultyData.password) {
                            this.showAlert('error', 'Please fill in all account fields.');
                            return;
                        }
                    } else if (this.facultyStep === 2) {
                        if (!this.facultyData.full_name || !this.facultyData.institution || !this.facultyData.department || !this.facultyData.designation) {
                            this.showAlert('error', 'Please fill in all institution fields.');
                            return;
                        }
                    }
                    this.alert.show = false;
                    this.facultyStep++;
                },

                showAlert(type, message) {
                    this.alert = { show: true, type, message };
                },

                async submitForm() {
                    if (this.loading) return;
                    this.loading = true;
                    this.alert.show = false;

                    const isReg = this.mode === 'register';
                    const endpoint = isReg ? '/auth/register' : '/auth/login';
                    const payload = isReg ? this.formData : { email: this.formData.email, password: this.formData.password };

                    try {
                        const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        const resData = await response.json();
                        if (!response.ok) throw new Error(resData.message || 'Authentication failed');

                        if (isReg) {
                            this.showAlert('success', 'Registration successful! You can now login.');
                            this.mode = 'login';
                            this.formData.username = '';
                            this.formData.password = '';
                        } else {
                            Auth.setToken(resData.token);
                            window.location.href = 'index.html';
                        }
                    } catch (err) {
                        this.showAlert('error', err.message);
                    } finally {
                        this.loading = false;
                    }
                },

                async submitFacultyForm() {
                    if (this.loading) return;
                    if (!this.facultyData.reason.trim()) {
                        this.showAlert('error', 'Please provide a reason for your faculty request.');
                        return;
                    }
                    this.loading = true;
                    this.alert.show = false;

                    try {
                        // Step 1: Register the user account
                        const regRes = await fetch(`${API_BASE_URL}/auth/register`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                username: this.facultyData.username,
                                email: this.facultyData.email,
                                password: this.facultyData.password
                            })
                        });
                        const regData = await regRes.json();
                        if (!regRes.ok) throw new Error(regData.message || 'Registration failed');

                        // Step 2: Log in to get token
                        const loginRes = await fetch(`${API_BASE_URL}/auth/login`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: this.facultyData.email, password: this.facultyData.password })
                        });
                        const loginData = await loginRes.json();
                        if (!loginRes.ok) throw new Error('Auto-login failed after registration.');

                        // Step 3: Submit faculty request
                        const facRes = await fetch(`${API_BASE_URL}/auth/faculty-register`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + loginData.token
                            },
                            body: JSON.stringify({
                                full_name: this.facultyData.full_name,
                                institution: this.facultyData.institution,
                                department: this.facultyData.department,
                                designation: this.facultyData.designation,
                                reason: this.facultyData.reason
                            })
                        });
                        const facData = await facRes.json();
                        if (!facRes.ok) throw new Error(facData.message || 'Failed to submit faculty request.');

                        this.showAlert('success', 'Your request is under review. We will contact you shortly.');
                        this.setMode('login');
                    } catch (err) {
                        this.showAlert('error', err.message);
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
