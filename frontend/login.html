<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AlgoNest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" crossorigin>
    <link rel="stylesheet" href="assets/css/tailwind.min.css">
    <link rel="stylesheet" href="assets/css/styles.css?v=2">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-100 dark:bg-slate-800 text-slate-800 dark:text-slate-100 min-h-screen flex items-center justify-center transition-colors duration-200">

    <div x-data="loginForm()" class="w-full max-w-md p-8 rounded-xl shadow-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 relative z-10">

        <!-- Logo/Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight text-blue-700 dark:text-blue-400">AlgoNest</h1>
            <p class="text-slate-500 dark:text-slate-400 mt-2"
               x-text="mode === 'login' ? 'Welcome back, coder!' : mode === 'register' ? 'Create an account to start coding' : 'Apply for Faculty Access'">
            </p>
        </div>

        <!-- Alert -->
        <div x-show="alert.show" x-transition class="mb-4 p-3 rounded-lg text-sm font-medium"
             :class="alert.type === 'error'
                ? 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400 border border-red-300 dark:border-red-700'
                : 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400 border border-green-300 dark:border-green-700'">
            <span x-text="alert.message"></span>
        </div>

        <!-- ── LOGIN / REGISTER FORM ── -->
        <form x-show="mode !== 'faculty'" @submit.prevent="submitForm">
            <div class="mb-4" x-show="mode === 'register'">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Username</label>
                <input type="text" x-model="formData.username"
                       class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg py-3 px-4 text-slate-800 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
            <div class="mb-4">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Email Address</label>
                <input type="email" x-model="formData.email" required
                       class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg py-3 px-4 text-slate-800 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
            <div class="mb-6">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Password</label>
                <input type="password" x-model="formData.password" required
                       class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg py-3 px-4 text-slate-800 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-all focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
                    :disabled="loading">
                <span x-show="!loading" x-text="mode === 'register' ? 'Sign Up' : 'Sign In'"></span>
                <span x-show="loading">Processing...</span>
            </button>
        </form>

        <!-- ── FACULTY REGISTRATION FORM ── -->
        <form x-show="mode === 'faculty'" @submit.prevent="submitFacultyForm">
            <!-- Step indicator -->
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center space-x-2">
                    <div :class="facultyStep >= 1 ? 'bg-blue-600 text-white' : 'bg-slate-200 dark:bg-slate-700 text-slate-500'"
                         class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold">1</div>
                    <div class="h-0.5 w-8 bg-slate-200 dark:bg-slate-700"></div>
                    <div :class="facultyStep >= 2 ? 'bg-blue-600 text-white' : 'bg-slate-200 dark:bg-slate-700 text-slate-500'"
                         class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold">2</div>
                    <div class="h-0.5 w-8 bg-slate-200 dark:bg-slate-700"></div>
                    <div :class="facultyStep >= 3 ? 'bg-blue-600 text-white' : 'bg-slate-200 dark:bg-slate-700 text-slate-500'"
                         class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold">3</div>
                </div>
                <span class="text-xs text-slate-500 dark:text-slate-400" x-text="'Step ' + facultyStep + ' of 3'"></span>
            </div>

            <!-- Step 1: Account -->
            <div x-show="facultyStep === 1" class="space-y-4">
                <p class="text-sm font-semibold text-slate-600 dark:text-slate-300 mb-3">Account Details</p>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Username</label>
                    <input type="text" x-model="facultyData.username" required
                           class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg py-3 px-4 text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Email Address</label>
                    <input type="email" x-model="facultyData.email" required
                           class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg py-3 px-4 text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Password</label>
                    <input type="password" x-model="facultyData.password" required
                           class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg py-3 px-4 text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all">
                </div>
                <button type="button" @click="facultyNextStep()"
                        class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-lg transition-all">
                    Next →
                </button>
            </div>

            <!-- Step 2: Institution -->
            <div x-show="facultyStep === 2" class="space-y-4">
                <p class="text-sm font-semibold text-slate-600 dark:text-slate-300 mb-3">Institution Details</p>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Full Name</label>
                    <input type="text" x-model="facultyData.full_name" required
                           class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg py-3 px-4 text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Institution / University</label>
                    <input type="text" x-model="facultyData.institution" required
                           class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg py-3 px-4 text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Department</label>
                    <input type="text" x-model="facultyData.department" required
                           class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg py-3 px-4 text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Designation</label>
                    <select x-model="facultyData.designation" required
                            class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg py-3 px-4 text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all">
                        <option value="">Select designation...</option>
                        <option>Professor</option>
                        <option>Associate Professor</option>
                        <option>Assistant Professor</option>
                        <option>Lecturer</option>
                        <option>Teaching Assistant</option>
                        <option>Visiting Faculty</option>
                        <option>Other</option>
                    </select>
                </div>
                <div class="flex gap-3">
                    <button type="button" @click="facultyStep = 1"
                            class="flex-1 bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 font-semibold py-3 rounded-lg transition-all">
                        ← Back
                    </button>
                    <button type="button" @click="facultyNextStep()"
                            class="flex-1 bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-lg transition-all">
                        Next →
                    </button>
                </div>
            </div>

            <!-- Step 3: Reason -->
            <div x-show="facultyStep === 3" class="space-y-4">
                <p class="text-sm font-semibold text-slate-600 dark:text-slate-300 mb-3">Why do you need faculty access?</p>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Reason / Motivation</label>
                    <textarea x-model="facultyData.reason" required rows="5"
                              placeholder="Briefly describe how you plan to use faculty access (e.g., setting assignments, reviewing student submissions)..."
                              class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg py-3 px-4 text-slate-800 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all resize-none"></textarea>
                </div>
                <div class="p-3 bg-purple-50 dark:bg-purple-900/20 border border-purple-200 dark:border-purple-800 rounded-lg">
                    <p class="text-xs text-purple-700 dark:text-purple-300">
                        🔒 Your request will be reviewed by an admin. You won't be able to log in until approved.
                    </p>
                </div>
                <div class="flex gap-3">
                    <button type="button" @click="facultyStep = 2"
                            class="flex-1 bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 font-semibold py-3 rounded-lg transition-all">
                        ← Back
                    </button>
                    <button type="submit"
                            class="flex-1 bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-lg transition-all"
                            :disabled="loading">
                        <span x-show="!loading">Submit Request 🎓</span>
                        <span x-show="loading">Submitting...</span>
                    </button>
                </div>
            </div>
        </form>

        <!-- ── Footer Links ── -->
        <div class="text-center mt-6 space-y-2">
            <template x-if="mode !== 'faculty'">
                <div>
                    <button @click="toggleMode()" class="text-sm text-slate-500 hover:text-slate-800 dark:hover:text-white transition-colors block w-full">
                        <span x-text="mode === 'register' ? 'Already have an account? Sign In' : 'New here? Create an account'"></span>
                    </button>
                    <button @click="setMode('faculty')" class="mt-2 text-sm text-purple-600 dark:text-purple-400 hover:text-purple-800 dark:hover:text-purple-300 transition-colors font-medium">
                        🎓 Register as Faculty
                    </button>
                </div>
            </template>
            <template x-if="mode === 'faculty'">
                <button @click="setMode('login')" class="text-sm text-slate-500 hover:text-slate-800 dark:hover:text-white transition-colors">
                    ← Back to Login
                </button>
            </template>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        function loginForm() {
            return {
                mode: 'login', // 'login' | 'register' | 'faculty'
                facultyStep: 1,
                loading: false,
                formData: { username: '', email: '', password: '' },
                facultyData: {
                    username: '', email: '', password: '',
                    full_name: '', institution: '', department: '',
                    designation: '', reason: ''
                },
                alert: { show: false, type: 'error', message: '' },

                setMode(m) {
                    this.mode = m;
                    this.alert.show = false;
                    this.facultyStep = 1;
                },
                toggleMode() {
                    this.mode = this.mode === 'login' ? 'register' : 'login';
                    this.alert.show = false;
                },

                facultyNextStep() {
                    // Basic validation per step
                    if (this.facultyStep === 1) {
                        if (!this.facultyData.username || !this.facultyData.email || !this.facultyData.password) {
                            this.showAlert('error', 'Please fill in all account fields.');
                            return;
                        }
                    } else if (this.facultyStep === 2) {
                        if (!this.facultyData.full_name || !this.facultyData.institution || !this.facultyData.department || !this.facultyData.designation) {
                            this.showAlert('error', 'Please fill in all institution fields.');
                            return;
                        }
                    }
                    this.alert.show = false;
                    this.facultyStep++;
                },

                showAlert(type, message) {
                    this.alert = { show: true, type, message };
                },

                async submitForm() {
                    if (this.loading) return;
                    this.loading = true;
                    this.alert.show = false;

                    const isReg = this.mode === 'register';
                    const endpoint = isReg ? '/auth/register' : '/auth/login';
                    const payload = isReg ? this.formData : { email: this.formData.email, password: this.formData.password };

                    try {
                        const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        const resData = await response.json();
                        if (!response.ok) throw new Error(resData.message || 'Authentication failed');

                        if (isReg) {
                            this.showAlert('success', 'Registration successful! You can now login.');
                            this.mode = 'login';
                            this.formData.username = '';
                            this.formData.password = '';
                        } else {
                            Auth.setToken(resData.token);
                            window.location.href = 'index.html';
                        }
                    } catch (err) {
                        this.showAlert('error', err.message);
                    } finally {
                        this.loading = false;
                    }
                },

                async submitFacultyForm() {
                    if (this.loading) return;
                    if (!this.facultyData.reason.trim()) {
                        this.showAlert('error', 'Please provide a reason for your faculty request.');
                        return;
                    }
                    this.loading = true;
                    this.alert.show = false;

                    try {
                        // Step 1: Register the user account
                        const regRes = await fetch(`${API_BASE_URL}/auth/register`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                username: this.facultyData.username,
                                email: this.facultyData.email,
                                password: this.facultyData.password
                            })
                        });
                        const regData = await regRes.json();
                        if (!regRes.ok) throw new Error(regData.message || 'Registration failed');

                        // Step 2: Log in to get token
                        const loginRes = await fetch(`${API_BASE_URL}/auth/login`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: this.facultyData.email, password: this.facultyData.password })
                        });
                        const loginData = await loginRes.json();
                        if (!loginRes.ok) throw new Error('Auto-login failed after registration.');

                        // Step 3: Submit faculty request
                        const facRes = await fetch(`${API_BASE_URL}/auth/faculty-register`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + loginData.token
                            },
                            body: JSON.stringify({
                                full_name: this.facultyData.full_name,
                                institution: this.facultyData.institution,
                                department: this.facultyData.department,
                                designation: this.facultyData.designation,
                                reason: this.facultyData.reason
                            })
                        });
                        const facData = await facRes.json();
                        if (!facRes.ok) throw new Error(facData.message || 'Failed to submit faculty request.');

                        this.showAlert('success', 'Your request is under review. We will contact you shortly.');
                        this.setMode('login');
                    } catch (err) {
                        this.showAlert('error', err.message);
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
