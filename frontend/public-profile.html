<!DOCTYPE html>
<html lang="en">
<head>
    <script>/* AlgoNest theme init */(function(){var t=localStorage.getItem("theme")||"dark";document.documentElement.classList.remove("dark","ember");if(t==="dark")document.documentElement.classList.add("dark");else if(t==="ember")document.documentElement.classList.add("ember");}());</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - AlgoNest</title>
    <!-- Tailwind CSS CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" crossorigin>
    <link rel="stylesheet" href="assets/css/tailwind.min.css">
    <link rel="stylesheet" href="assets/css/styles.css?v=3">
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-100 dark:bg-slate-800 text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-200" x-data="publicProfileApp()" x-init="initTheme(); init()">
    
    <!-- Navbar -->
    <nav class="border-b border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center gap-2 shrink-0">
                        <div class="flex items-center justify-center w-8 h-8 rounded-lg shrink-0"
                             style="background:linear-gradient(135deg,#3b82f6,#6366f1);box-shadow:0 3px 10px rgba(99,102,241,0.4);">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16M7 8l-4 4 4 4M17 8l4 4-4 4"/>
                            </svg>
                        </div>
                        <span class="text-xl font-extrabold tracking-tight text-slate-900 dark:text-white" style="letter-spacing:-0.3px;">Algo<span class="text-blue-500 dark:text-blue-400">Nest</span></span>
                    </a>
                    <div class="hidden md:block ml-10 flex items-baseline space-x-4">
                        <a href="index.html" class="text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Dashboard</a>
                        <a href="problems.html" class="text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Problems</a>
                        <a href="leaderboard.html" class="text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Leaderboard</a>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="relative" x-data="{ open: false, current: localStorage.getItem('theme') || 'dark', setTheme(t) { this.current = t; const h = document.documentElement; h.classList.remove('dark','ember'); if (t === 'dark') h.classList.add('dark'); if (t === 'ember') h.classList.add('ember'); localStorage.setItem('theme', t); this.open = false; } }" @keydown.escape.window="open = false">
                        <button @click="open = !open" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white focus:outline-none flex items-center gap-1" title="Choose theme">
                            <svg x-show="current === 'dark'" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                            <svg x-show="current === 'light'" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                            <svg x-show="current === 'ember'" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.879 16.121A3 3 0 1012.015 11L11 14H9c0 .768.293 1.536.879 2.121z"/></svg>
                            <svg class="h-3 w-3 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/></svg>
                        </button>
                        <div x-show="open" @click.outside="open = false" x-transition class="absolute right-0 mt-2 w-40 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg shadow-lg z-50 py-1">
                            <button @click="setTheme('dark')" class="w-full flex items-center gap-2 px-3 py-2 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" :class="current === 'dark' ? 'font-semibold text-blue-600 dark:text-blue-400' : ''">
                                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                                Dark
                            </button>
                            <button @click="setTheme('light')" class="w-full flex items-center gap-2 px-3 py-2 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" :class="current === 'light' ? 'font-semibold text-blue-600 dark:text-blue-400' : ''">
                                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                                Light
                            </button>
                            <button @click="setTheme('ember')" class="w-full flex items-center gap-2 px-3 py-2 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" :class="current === 'ember' ? 'font-semibold !text-orange-500' : ''">
                                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.879 16.121A3 3 0 1012.015 11L11 14H9c0 .768.293 1.536.879 2.121z"/></svg>
                                Ember
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <template x-if="loading">
            <div class="text-center py-12">
                <div class="inline-block">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                </div>
                <p class="mt-4 text-slate-600 dark:text-slate-400">Loading profile...</p>
            </div>
        </template>

        <template x-if="!loading && profile">
            <div>
                <!-- Back to previous page -->
                <button @click="window.history.back()" class="mb-6 text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 font-semibold flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    Back
                </button>

                <!-- User Header -->
                <div class="bg-white dark:bg-slate-900 rounded-xl shadow-md p-8 mb-6">
                    <div class="flex items-start space-x-6">
                        <!-- Avatar -->
                        <div>
                            <template x-if="profile.avatar_url">
                                <img :src="API_BASE_URL.replace('/api', '') + profile.avatar_url" :alt="profile.username" class="w-32 h-32 rounded-full object-cover border-4 border-blue-600">
                            </template>
                            <template x-if="!profile.avatar_url">
                                <div class="w-32 h-32 rounded-full bg-gradient-to-br from-blue-400 to-blue-600 flex items-center justify-center text-white text-5xl font-bold" x-text="profile.username.charAt(0).toUpperCase()"></div>
                            </template>
                        </div>

                        <!-- User Info -->
                        <div class="flex-1">
                            <h1 class="text-4xl font-bold text-slate-800 dark:text-slate-100 mb-2" x-text="profile.username"></h1>
                            
                            <div class="grid grid-cols-2 gap-4 mt-4">
                                <div>
                                    <p class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase">Current Streak</p>
                                    <p class="text-2xl font-bold text-blue-600 dark:text-blue-400" x-text="profile.streak_count"></p>
                                </div>
                                <div>
                                    <p class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase">Member Since</p>
                                    <p class="text-lg font-semibold text-slate-700 dark:text-slate-300" x-text="formatDate(profile.created_at)"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Stats -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div class="bg-white dark:bg-slate-900 rounded-xl shadow-md p-6">
                        <p class="text-sm font-semibold text-slate-500 dark:text-slate-400 mb-2">Total Problems Solved</p>
                        <p class="text-3xl font-bold text-green-600 dark:text-green-400" x-text="stats.solved_count || 0"></p>
                    </div>
                    <div class="bg-white dark:bg-slate-900 rounded-xl shadow-md p-6">
                        <p class="text-sm font-semibold text-slate-500 dark:text-slate-400 mb-2">Current Streak</p>
                        <p class="text-3xl font-bold text-yellow-500 dark:text-yellow-400" x-text="profile.streak_count"></p>
                    </div>
                    <div class="bg-white dark:bg-slate-900 rounded-xl shadow-md p-6">
                        <p class="text-sm font-semibold text-slate-500 dark:text-slate-400 mb-2">Accuracy</p>
                        <p class="text-3xl font-bold text-purple-600 dark:text-purple-400" x-text="stats.accuracy + '%'"></p>
                    </div>
                </div>

                <!-- Problems Solved Section -->
                <div class="bg-white dark:bg-slate-900 rounded-xl shadow-md p-6">
                    <h2 class="text-2xl font-bold text-slate-800 dark:text-slate-100 mb-4">Problems Solved</h2>
                    
                    <template x-if="solvedProblems.length > 0">
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead>
                                    <tr class="border-b border-slate-200 dark:border-slate-700">
                                        <th class="text-left py-3 px-4 font-semibold text-slate-700 dark:text-slate-300">Problem</th>
                                        <th class="text-left py-3 px-4 font-semibold text-slate-700 dark:text-slate-300">Difficulty</th>
                                        <th class="text-left py-3 px-4 font-semibold text-slate-700 dark:text-slate-300">Solved On</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="problem in solvedProblems" :key="problem.id">
                                        <tr class="border-b border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition">
                                            <td class="py-3 px-4">
                                                <a :href="'problem.html?id=' + problem.problem_id" class="text-blue-600 dark:text-blue-400 hover:underline font-semibold" x-text="problem.problem_title"></a>
                                            </td>
                                            <td class="py-3 px-4">
                                                <span :class="getDifficultyColor(problem.difficulty)" class="px-2 py-1 rounded-full text-xs font-semibold" x-text="problem.difficulty"></span>
                                            </td>
                                            <td class="py-3 px-4 text-slate-600 dark:text-slate-400" x-text="formatDate(problem.created_at)"></td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>

                    <template x-if="solvedProblems.length === 0">
                        <p class="text-slate-500 dark:text-slate-400 text-center py-8">No problems solved yet</p>
                    </template>
                </div>
            </div>
        </template>

        <template x-if="!loading && error">
            <div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl p-6 text-center">
                <p class="text-red-700 dark:text-red-300 font-semibold" x-text="error"></p>
                <a href="leaderboard.html" class="mt-4 inline-block text-blue-600 dark:text-blue-400 hover:underline">Back to Leaderboard</a>
            </div>
        </template>
    </main>

    <script src="assets/js/app.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        function publicProfileApp() {
            return {
                profile: null,
                solvedProblems: [],
                stats: {
                    solved_count: 0,
                    accuracy: 0,
                    total_submissions: 0
                },
                loading: true,
                error: null,

                async init() {
                    // Get userId from URL query param
                    const params = new URLSearchParams(window.location.search);
                    const userId = params.get('id');

                    if (!userId) {
                        this.error = 'User ID not provided';
                        this.loading = false;
                        return;
                    }

                    try {
                        // Fetch public profile
                        console.log('Fetching profile for userId:', userId);
                        const profileRes = await fetch(`${API_BASE_URL}/users/${userId}/profile`);
                        console.log('Profile response status:', profileRes.status);
                        console.log('Profile response ok:', profileRes.ok);
                        
                        const profileText = await profileRes.text();
                        console.log('Profile response text:', profileText);
                        
                        if (!profileRes.ok) throw new Error('User not found - Status: ' + profileRes.status);
                        
                        this.profile = JSON.parse(profileText);
                        console.log('Profile data:', this.profile);

                        // Fetch user's stats
                        const statsRes = await fetch(`${API_BASE_URL}/users/${userId}/stats`);
                        if (statsRes.ok) {
                            this.stats = await statsRes.json();
                            console.log('Stats:', this.stats);
                        }

                        // Fetch user's solved problems
                        const submissionsRes = await fetch(`${API_BASE_URL}/users/${userId}/submissions`);
                        if (submissionsRes.ok) {
                            this.solvedProblems = await submissionsRes.json();
                            console.log('Solved problems:', this.solvedProblems);
                        }

                        this.loading = false;
                    } catch (err) {
                        console.error('Error details:', err);
                        this.error = err.message || 'Failed to load profile';
                        this.loading = false;
                    }
                },                
                formatDate(dateString) {
                    if (!dateString) return 'N/A';
                    try {
                        // Handle both ISO format and other formats
                        const date = new Date(dateString);
                        if (isNaN(date.getTime())) {
                            return 'N/A';
                        }
                        return date.toLocaleDateString('en-US', { 
                            year: 'numeric', 
                            month: 'short', 
                            day: 'numeric' 
                        });
                    } catch (e) {
                        console.error('Error formatting date:', dateString, e);
                        return 'N/A';
                    }
                },

                getDifficultyColor(difficulty) {
                    const colors = {
                        'Easy': 'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-300',
                        'Medium': 'bg-yellow-100 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-300',
                        'Hard': 'bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300'
                    };
                    return colors[difficulty] || 'bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-300';
                },

                toggleTheme() {
                    document.documentElement.classList.toggle('dark');
                    localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
                }
            }
        }
    </script>
</body>
</html>
