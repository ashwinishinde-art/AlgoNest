<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problems - AlgoNest</title>
    <!-- Tailwind CSS CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" crossorigin>
    <link rel="stylesheet" href="assets/css/tailwind.min.css">
    <link rel="stylesheet" href="assets/css/styles.css?v=3">
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-100 dark:bg-slate-800 text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-200" x-data="problemsApp()">
    
    <!-- Navbar -->
    <nav class="border-b border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center gap-2 shrink-0">
                        <div class="flex items-center justify-center w-8 h-8 rounded-lg shrink-0"
                             style="background:linear-gradient(135deg,#3b82f6,#6366f1);box-shadow:0 3px 10px rgba(99,102,241,0.4);">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16M7 8l-4 4 4 4M17 8l4 4-4 4"/>
                            </svg>
                        </div>
                        <span class="text-xl font-extrabold tracking-tight text-slate-900 dark:text-white" style="letter-spacing:-0.3px;">Algo<span class="text-blue-500 dark:text-blue-400">Nest</span></span>
                    </a>
                    <div class="hidden md:block ml-10 flex items-baseline space-x-4">
                        <a href="index.html" class="text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Dashboard</a>
                        <a href="problems.html" class="bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-white px-3 py-2 rounded-md text-sm font-medium">Problems</a>
                        <a href="leaderboard.html" class="text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Leaderboard</a>
                        <a href="contact.html" class="text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Contact Us</a>
                        <template x-if="user && user.role === 'faculty'">
                            <a href="faculty.html" class="text-purple-600 dark:text-purple-400 hover:bg-purple-50 dark:hover:bg-purple-900/20 px-3 py-2 rounded-md text-sm font-medium transition-colors">Faculty</a>
                        </template>
                        <template x-if="user && user.role === 'admin'">
                            <a href="admin.html" class="text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Admin</a>
                        </template>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="relative" x-data="{ open: false, current: localStorage.getItem('theme') || 'dark', setTheme(t) { this.current = t; const h = document.documentElement; h.classList.remove('dark'); if (t === 'dark') h.classList.add('dark'); localStorage.setItem('theme', t); this.open = false; } }" @keydown.escape.window="open = false">
                        <button @click="open = !open" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white focus:outline-none flex items-center gap-1" title="Choose theme">
                            <svg x-show="current === 'dark'" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                            <svg x-show="current === 'light'" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                            <svg class="h-3 w-3 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/></svg>
                        </button>
                        <div x-show="open" @click.outside="open = false" x-transition class="absolute right-0 mt-2 w-40 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg shadow-lg z-50 py-1">
                            <button @click="setTheme('dark')" class="w-full flex items-center gap-2 px-3 py-2 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" :class="current === 'dark' ? 'font-semibold text-blue-600 dark:text-blue-400' : ''">
                                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                                Dark
                            </button>
                            <button @click="setTheme('light')" class="w-full flex items-center gap-2 px-3 py-2 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" :class="current === 'light' ? 'font-semibold text-blue-600 dark:text-blue-400' : ''">
                                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                                Light
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center space-x-3 pl-4 border-l border-slate-200 dark:border-slate-700">
                        <template x-if="profile && profile.avatar_url">
                            <img :src="API_BASE_URL.replace('/api', '') + profile.avatar_url" alt="Profile" class="w-8 h-8 rounded-full object-cover">
                        </template>
                        <template x-if="!profile || !profile.avatar_url">
                            <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-sm" x-text="user ? user.username.charAt(0).toUpperCase() : '?'"></div>
                        </template>
                        <a href="profile.html" class="text-sm font-semibold text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white">
                            <span x-text="user ? user.username : ''"></span>
                        </a>
                    </div>
                    <button @click="Auth.logout()" class="text-sm bg-red-600 hover:bg-red-700 text-white px-3 py-1.5 rounded-lg font-semibold transition-colors">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        
        <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight">Problem Library</h1>
                <p class="text-slate-500 dark:text-slate-400 mt-2">Challenge yourself with curated coding problems.</p>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900">
            <!-- Search -->
            <div class="col-span-1 md:col-span-1">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Search</label>
                <input type="text" x-model="search" @input="filterProblems()" placeholder="Search title..." 
                       class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg py-2 px-3 text-sm text-slate-800 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Difficulty Filter -->
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Difficulty</label>
                <select x-model="selectedDifficulty" @change="filterProblems()"
                        class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg py-2 px-3 text-sm text-slate-700 dark:text-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">All Difficulties</option>
                    <option value="Easy">Easy</option>
                    <option value="Medium">Medium</option>
                    <option value="Hard">Hard</option>
                </select>
            </div>

            <!-- Topic Filter -->
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Topic Tag</label>
                <input type="text" x-model="selectedTopic" @input="filterProblems()" placeholder="e.g. Arrays, Strings..." 
                       class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg py-2 px-3 text-sm text-slate-800 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Status Filter -->
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Status</label>
                <select x-model="selectedStatus" @change="filterProblems()"
                        class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg py-2 px-3 text-sm text-slate-700 dark:text-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">All Statuses</option>
                    <option value="Solved">Solved</option>
                    <option value="Unsolved">Unsolved</option>
                </select>
            </div>
        </div>

        <!-- Problems Table -->
        <div class="rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 overflow-hidden">
            <table class="min-w-full divide-y divide-slate-200 dark:divide-slate-700">
                <thead class="bg-slate-50 dark:bg-slate-800">
                    <tr>
                        <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider w-16">Status</th>
                        <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Title</th>
                        <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Difficulty</th>
                        <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Topic Tags</th>
                        <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-200 dark:divide-slate-700">
                    <template x-for="prob in filteredProblems" :key="prob.id">
                        <tr class="hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                            <td class="px-6 py-4 text-sm font-semibold">
                                <template x-if="solvedMap[prob.id]">
                                    <span class="text-green-600 dark:text-green-500">
                                        <svg class="w-5.5 h-5.5 inline" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                                    </span>
                                </template>
                                <template x-if="attemptedMap[prob.id] && !solvedMap[prob.id]">
                                    <span class="text-yellow-600 dark:text-yellow-500">
                                        <svg class="w-5.5 h-5.5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    </span>
                                </template>
                            </td>
                            <td class="px-6 py-4 text-sm font-bold text-slate-800 dark:text-slate-100">
                                <a :href="`problem.html?id=${prob.id}`" class="hover:text-blue-700 dark:hover:text-blue-400 transition-colors" x-text="prob.title"></a>
                            </td>
                            <td class="px-6 py-4 text-sm font-semibold">
                                <span class="px-2.5 py-0.5 rounded text-xs font-bold"
                                      :class="prob.difficulty === 'Easy' ? 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400' : 
                                              prob.difficulty === 'Medium' ? 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-400' : 
                                              'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400'"
                                      x-text="prob.difficulty"></span>
                            </td>
                            <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-300">
                                <div class="flex flex-wrap gap-1">
                                    <template x-for="tag in prob.topic_tags.split(',')" :key="tag">
                                        <span class="bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-400 text-xs px-2 py-0.5 rounded font-medium" x-text="tag.trim()"></span>
                                    </template>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-sm">
                                <a :href="`problem.html?id=${prob.id}`" 
                                   class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-3.5 py-1.5 rounded-lg text-xs transition-all">
                                    Solve Code
                                </a>
                            </td>
                        </tr>
                    </template>
                    <template x-if="filteredProblems.length === 0">
                        <tr>
                            <td colspan="5" class="px-6 py-10 text-center text-slate-400 text-sm">No problems match the current filter selection.</td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

    </main>

    <script src="assets/js/app.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        function problemsApp() {
            return {
                user: null,
                profile: null,
                problems: [],
                filteredProblems: [],
                solvedMap: {},
                attemptedMap: {},
                
                search: '',
                selectedDifficulty: '',
                selectedTopic: '',
                selectedStatus: '',

                init() {
                    Auth.checkAuthGuard();
                    this.user = Auth.getUser();
                    this.fetchProfile();
                    this.fetchProblems();
                },

                async fetchProfile() {
                    try {
                        const response = await fetch(`${API_BASE_URL}/auth/profile`, {
                            headers: Auth.getAuthHeader()
                        });
                        if (response.ok) {
                            this.profile = await response.json();
                            // Update user object with latest profile data
                            if (this.user) {
                                this.user.username = this.profile.username;
                            }
                        }
                    } catch (e) {
                        console.error('Error fetching profile', e);
                    }
                },

                async fetchProblems() {
                    try {
                        const response = await fetch(`${API_BASE_URL}/problems`, {
                            headers: Auth.getAuthHeader()
                        });
                        if (response.ok) {
                            this.problems = await response.json();
                            await this.fetchSubmissionStatuses();
                            this.filterProblems();
                        }
                    } catch (e) {
                        console.error('Error fetching problems list', e);
                    }
                },

                async fetchSubmissionStatuses() {
                    try {
                        const response = await fetch(`${API_BASE_URL}/submissions/history`, {
                            headers: Auth.getAuthHeader()
                        });
                        if (response.ok) {
                            const submissions = await response.json();
                            submissions.forEach(sub => {
                                this.attemptedMap[sub.problem_id] = true;
                                if (sub.status === 'Accepted') {
                                    this.solvedMap[sub.problem_id] = true;
                                }
                            });
                        }
                    } catch (e) {
                        console.error('Error fetching user submissions', e);
                    }
                },

                filterProblems() {
                    this.filteredProblems = this.problems.filter(prob => {
                        const matchesSearch = prob.title.toLowerCase().includes(this.search.toLowerCase());
                        const matchesDiff = this.selectedDifficulty === '' || prob.difficulty === this.selectedDifficulty;
                        const matchesTopic = this.selectedTopic === '' || prob.topic_tags.toLowerCase().includes(this.selectedTopic.toLowerCase());
                        
                        let matchesStatus = true;
                        if (this.selectedStatus === 'Solved') {
                            matchesStatus = this.solvedMap[prob.id] === true;
                        } else if (this.selectedStatus === 'Unsolved') {
                            matchesStatus = !this.solvedMap[prob.id];
                        }

                        return matchesSearch && matchesDiff && matchesTopic && matchesStatus;
                    });
                }
            }
        }
    </script>
</body>
</html>
