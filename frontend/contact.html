<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - AlgoNest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" crossorigin>
    <link rel="stylesheet" href="assets/css/tailwind.min.css">
    <link rel="stylesheet" href="assets/css/styles.css?v=4">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-100 dark:bg-slate-800 text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-200" x-data="contactApp()">

    <!-- Navbar -->
    <nav class="border-b border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center gap-2 shrink-0">
                        <div class="flex items-center justify-center w-8 h-8 rounded-lg shrink-0"
                             style="background:linear-gradient(135deg,#3b82f6,#6366f1);box-shadow:0 3px 10px rgba(99,102,241,0.4);">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16M7 8l-4 4 4 4M17 8l4 4-4 4"/>
                            </svg>
                        </div>
                        <span class="text-xl font-extrabold tracking-tight text-slate-900 dark:text-white" style="letter-spacing:-0.3px;">Algo<span class="text-blue-500 dark:text-blue-400">Nest</span></span>
                    </a>
                    <div class="hidden md:block ml-10 flex items-baseline space-x-4">
                        <a href="index.html" class="text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Dashboard</a>
                        <a href="problems.html" class="text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Problems</a>
                        <a href="leaderboard.html" class="text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Leaderboard</a>
                        <a href="contact.html" class="bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-white px-3 py-2 rounded-md text-sm font-medium">Contact Us</a>
                        <template x-if="user && user.role === 'faculty'">
                            <a href="faculty.html" class="text-purple-600 dark:text-purple-400 hover:bg-purple-50 dark:hover:bg-purple-900/20 px-3 py-2 rounded-md text-sm font-medium transition-colors">Faculty</a>
                        </template>
                        <template x-if="user && user.role === 'admin'">
                            <a href="admin.html" class="text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Admin</a>
                        </template>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <!-- Theme picker -->
                    <div class="relative" x-data="{ open: false, current: localStorage.getItem('theme') || 'dark', setTheme(t) { this.current = t; const h = document.documentElement; h.classList.remove('dark'); if (t === 'dark') h.classList.add('dark'); localStorage.setItem('theme', t); this.open = false; } }" @keydown.escape.window="open = false">
                        <button @click="open = !open" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white focus:outline-none flex items-center gap-1" title="Choose theme">
                            <svg x-show="current === 'dark'" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                            <svg x-show="current === 'light'" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                            <svg class="h-3 w-3 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/></svg>
                        </button>
                        <div x-show="open" @click.outside="open = false" x-transition class="absolute right-0 mt-2 w-40 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg shadow-lg z-50 py-1">
                            <button @click="setTheme('dark')" class="w-full flex items-center gap-2 px-3 py-2 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" :class="current === 'dark' ? 'font-semibold text-blue-600 dark:text-blue-400' : ''">
                                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg> Dark
                            </button>
                            <button @click="setTheme('light')" class="w-full flex items-center gap-2 px-3 py-2 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" :class="current === 'light' ? 'font-semibold text-blue-600 dark:text-blue-400' : ''">
                                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg> Light
                            </button>
                        </div>
                    </div>
                    <!-- User / logout -->
                    <template x-if="user">
                        <div class="flex items-center space-x-3 pl-4 border-l border-slate-200 dark:border-slate-700">
                            <a href="profile.html" class="text-sm font-semibold text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white" x-text="user.username"></a>
                            <button @click="Auth.logout()" class="text-sm bg-red-600 hover:bg-red-700 text-white px-3 py-1.5 rounded-lg font-semibold transition-colors">Logout</button>
                        </div>
                    </template>
                    <template x-if="!user">
                        <a href="login.html" class="text-sm bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg font-semibold transition-colors">Login</a>
                    </template>
                </div>
            </div>
        </div>
    </nav>


    <!-- Main -->
    <main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

        <!-- Page header -->
        <div class="mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight">Contact Us</h1>
            <p class="text-slate-500 dark:text-slate-400 mt-2">Report a bug, request a feature, ask a question, or reach out to the admin for anything — we read every message.</p>
        </div>

        <!-- Success banner -->
        <div x-show="successMsg" x-transition class="mb-6 flex items-center gap-3 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-700 rounded-xl px-5 py-4">
            <svg class="w-5 h-5 text-green-600 dark:text-green-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            <p class="text-green-700 dark:text-green-300 text-sm font-medium" x-text="successMsg"></p>
        </div>

        <!-- Error banner -->
        <div x-show="errorMsg" x-transition class="mb-6 flex items-center gap-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-700 rounded-xl px-5 py-4">
            <svg class="w-5 h-5 text-red-600 dark:text-red-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            <p class="text-red-700 dark:text-red-300 text-sm font-medium" x-text="errorMsg"></p>
        </div>

        <!-- Contact form -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-8 mb-10">
            <h2 class="text-lg font-bold mb-6 flex items-center gap-2">
                <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                Send a Message
            </h2>
            <form @submit.prevent="submitForm">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Your Name</label>
                        <input type="text" x-model="form.sender_name" required placeholder="Full name"
                               class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg py-2.5 px-4 text-sm text-slate-800 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Email</label>
                        <input type="email" x-model="form.sender_email" required placeholder="you@example.com"
                               class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg py-2.5 px-4 text-sm text-slate-800 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Category</label>
                        <select x-model="form.category"
                                class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg py-2.5 px-4 text-sm text-slate-700 dark:text-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="bug">Bug Report</option>
                            <option value="suggestion">Feature / Change Request</option>
                            <option value="question">Question</option>
                            <option value="content">Content Issue</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Subject</label>
                        <input type="text" x-model="form.subject" required placeholder="Brief subject line"
                               class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg py-2.5 px-4 text-sm text-slate-800 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <div class="mb-6">
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Message</label>
                    <textarea x-model="form.message" rows="6" required placeholder="Describe your issue, request, or question in detail..."
                              class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg py-2.5 px-4 text-sm text-slate-800 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
                </div>
                <div class="flex justify-end">
                    <button type="submit" :disabled="submitting"
                            class="bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white font-semibold px-6 py-2.5 rounded-lg transition-all flex items-center gap-2">
                        <svg x-show="!submitting" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                        <svg x-show="submitting" class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                        <span x-text="submitting ? 'Sending…' : 'Send Message'"></span>
                    </button>
                </div>
            </form>
        </div>

        <!-- My Previous Messages -->
        <template x-if="user">
            <div>
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-3 3-3-3z"/></svg>
                    My Previous Messages
                </h2>
                <template x-if="loadingMine">
                    <div class="text-center py-10 text-slate-400 text-sm">Loading your messages…</div>
                </template>
                <template x-if="!loadingMine && myMessages.length === 0">
                    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-10 text-center text-slate-400 text-sm">
                        You haven't sent any messages yet.
                    </div>
                </template>
                <div class="space-y-4">
                    <template x-for="msg in myMessages" :key="msg.id">
                        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden">
                            <!-- Message header -->
                            <div class="flex items-start justify-between gap-3 px-6 py-4 border-b border-slate-100 dark:border-slate-800">
                                <div class="flex-1 min-w-0">
                                    <p class="font-semibold text-slate-800 dark:text-slate-100 truncate" x-text="msg.subject"></p>
                                    <p class="text-xs text-slate-400 mt-0.5" x-text="formatDate(msg.created_at)"></p>
                                </div>
                                <div class="flex items-center gap-2 shrink-0">
                                    <span class="text-xs px-2.5 py-0.5 rounded-full font-semibold capitalize"
                                          :class="{
                                              'bg-slate-100 text-slate-500 dark:bg-slate-700 dark:text-slate-400': msg.category === 'other',
                                              'bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400': msg.category === 'bug',
                                              'bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400': msg.category === 'suggestion',
                                              'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-400': msg.category === 'question',
                                              'bg-purple-100 text-purple-600 dark:bg-purple-900/30 dark:text-purple-400': msg.category === 'content'
                                          }"
                                          x-text="msg.category.replace('_',' ')"></span>
                                    <span class="text-xs px-2.5 py-0.5 rounded-full font-semibold"
                                          :class="{
                                              'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-400': msg.status === 'open',
                                              'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400': msg.status === 'replied',
                                              'bg-slate-200 text-slate-500 dark:bg-slate-700 dark:text-slate-400': msg.status === 'closed'
                                          }"
                                          x-text="msg.status"></span>
                                </div>
                            </div>
                            <!-- Original message -->
                            <div class="px-6 py-4 text-sm text-slate-600 dark:text-slate-300 whitespace-pre-wrap" x-text="msg.message"></div>
                            <!-- Admin reply -->
                            <template x-if="msg.admin_reply">
                                <div class="mx-6 mb-4 bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-lg px-4 py-3">
                                    <p class="text-xs font-semibold text-blue-600 dark:text-blue-400 mb-1 flex items-center gap-1">
                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>
                                        Admin reply
                                        <span class="ml-1 text-slate-400 font-normal" x-text="msg.replied_at ? '· ' + formatDate(msg.replied_at) : ''"></span>
                                    </p>
                                    <p class="text-sm text-slate-700 dark:text-slate-200 whitespace-pre-wrap" x-text="msg.admin_reply"></p>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </template>

    </main>


    <script src="assets/js/app.js?v=2"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        function contactApp() {
            return {
                user: null,
                form: {
                    sender_name: '',
                    sender_email: '',
                    category: 'other',
                    subject: '',
                    message: ''
                },
                submitting: false,
                successMsg: '',
                errorMsg: '',
                myMessages: [],
                loadingMine: false,

                init() {
                    // apply saved theme
                    const t = localStorage.getItem('theme') || 'dark';
                    if (t === 'dark') document.documentElement.classList.add('dark');
                    else document.documentElement.classList.remove('dark');

                    // try to get logged-in user (not required)
                    try {
                        Auth.checkAuthGuard && Auth.checkAuthGuard();
                    } catch(e) {}
                    this.user = Auth.getUser ? Auth.getUser() : null;

                    // pre-fill name/email from profile if logged in
                    if (this.user) {
                        this.prefillProfile();
                        this.loadMyMessages();
                    }
                },

                async prefillProfile() {
                    try {
                        const res = await fetch(`${API_BASE_URL}/auth/profile`, { headers: Auth.getAuthHeader() });
                        if (res.ok) {
                            const p = await res.json();
                            this.form.sender_name  = p.username || '';
                            this.form.sender_email = p.email    || '';
                        }
                    } catch(e) {}
                },

                async loadMyMessages() {
                    this.loadingMine = true;
                    try {
                        const res = await fetch(`${API_BASE_URL}/contact/my`, { headers: Auth.getAuthHeader() });
                        if (res.ok) this.myMessages = await res.json();
                    } catch(e) { console.error(e); }
                    finally { this.loadingMine = false; }
                },

                async submitForm() {
                    this.submitting = true;
                    this.successMsg = '';
                    this.errorMsg   = '';
                    try {
                        const res = await fetch(`${API_BASE_URL}/contact`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', ...Auth.getAuthHeader() },
                            body: JSON.stringify(this.form)
                        });
                        const data = await res.json();
                        if (res.ok) {
                            this.successMsg = data.message || 'Message sent! The admin will get back to you soon.';
                            this.form.subject = '';
                            this.form.message = '';
                            this.form.category = 'other';
                            if (this.user) this.loadMyMessages();
                        } else {
                            this.errorMsg = data.message || 'Failed to send message.';
                        }
                    } catch(e) {
                        this.errorMsg = 'Network error. Please try again.';
                    } finally {
                        this.submitting = false;
                    }
                },

                formatDate(d) {
                    if (!d) return '';
                    return new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
                }
            }
        }
    </script>
</body>
</html>
